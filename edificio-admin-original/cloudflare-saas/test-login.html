<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
        }
        input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        button {
            background: #007bff;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
        .response {
            margin-top: 20px;
            padding: 15px;
            border-radius: 4px;
            background: #f8f9fa;
        }
        .success {
            background: #d4edda;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <h1>Test Login API</h1>
    
    <h2>Registro</h2>
    <form id="registerForm">
        <div class="form-group">
            <label>Nombre:</label>
            <input type="text" id="reg_name" value="Test User" required>
        </div>
        <div class="form-group">
            <label>Email:</label>
            <input type="email" id="reg_email" value="test@example.com" required>
        </div>
        <div class="form-group">
            <label>Password:</label>
            <input type="password" id="reg_password" value="password123" required>
        </div>
        <button type="submit">Registrar</button>
    </form>
    <div id="registerResponse" class="response" style="display:none;"></div>

    <hr style="margin: 40px 0;">

    <h2>Login</h2>
    <form id="loginForm">
        <div class="form-group">
            <label>Email:</label>
            <input type="email" id="login_email" value="test@example.com" required>
        </div>
        <div class="form-group">
            <label>Password:</label>
            <input type="password" id="login_password" value="password123" required>
        </div>
        <button type="submit">Login</button>
    </form>
    <div id="loginResponse" class="response" style="display:none;"></div>

    <script>
        const API_URL = '/api/auth';

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const responseDiv = document.getElementById('registerResponse');
            responseDiv.style.display = 'block';
            responseDiv.textContent = 'Procesando...';
            responseDiv.className = 'response';

            try {
                const response = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        name: document.getElementById('reg_name').value,
                        email: document.getElementById('reg_email').value,
                        password: document.getElementById('reg_password').value
                    })
                });

                const data = await response.json();
                
                responseDiv.textContent = JSON.stringify(data, null, 2);
                responseDiv.className = data.success ? 'response success' : 'response error';
            } catch (error) {
                responseDiv.textContent = 'Error: ' + error.message;
                responseDiv.className = 'response error';
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const responseDiv = document.getElementById('loginResponse');
            responseDiv.style.display = 'block';
            responseDiv.textContent = 'Procesando...';
            responseDiv.className = 'response';

            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: document.getElementById('login_email').value,
                        password: document.getElementById('login_password').value
                    })
                });

                const data = await response.json();
                
                responseDiv.textContent = JSON.stringify(data, null, 2);
                responseDiv.className = data.success ? 'response success' : 'response error';

                if (data.success && data.token) {
                    localStorage.setItem('edificio_token', data.token);
                    localStorage.setItem('edificio_user', JSON.stringify(data.user));
                }
            } catch (error) {
                responseDiv.textContent = 'Error: ' + error.message;
                responseDiv.className = 'response error';
            }
        });
    </script>
</body>
</html>
